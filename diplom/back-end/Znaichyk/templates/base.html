{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Znaichyk{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block styles %}{% endblock %}
</head>
<body>

    <nav>
        <div class="logo">
            <a href="/" style="margin: 0; text-decoration: none;">Znaichyk</a>
        </div>
        <div>
            {% if user.is_authenticated %}
                <a href="{% url 'profile' %}" style="font-weight: 700; color: var(--text-color);">Привіт, {{ user.email }}</a>
                <a href="/play/">Грати</a>
                <a href="{% url 'logout' %}">Вийти</a>
            {% else %}
                <a href="{% url 'login' %}" class="nav-auth-btn">Увійти</a>
            {% endif %}
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer>
        &copy; 2026 Znaichyk Project
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
