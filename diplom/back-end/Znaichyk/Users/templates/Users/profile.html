{% extends 'base.html' %}
{% block content %}
<main style="text-align: center; padding: 50px;">
    <div style="background: #f4f4f4; display: inline-block; padding: 20px; border-radius: 10px;">
        <h3>Рівні навичок:</h3>
        <p>Мова: <b>{{ user.profile.language }}</b></p>
        <p>Математика: <b>{{ user.profile.math }}</b></p>
        <p>Логіка: <b>{{ user.profile.logic }}</b></p>
        <p>Пам'ять: <b>{{ user.profile.memory }}</b></p>
        <p>Завершено сесій: <b>{{ user.profile.completed_sessions }}</b></p>
    </div>
    <br><br>
</main>
{% endblock %}
