{% extends 'base.html' %}
{% load static %}

{% block title %}Новий пароль | Znaichyk{% endblock %}

{% block content %}
<main class="auth-page">
    <div class="auth-card">
        <h1>Новий пароль</h1>
        <form method="post">
            {% csrf_token %}
            <div class="form-fields">
                {% if form.non_field_errors %}
                    <div class="error-msg">{{ form.non_field_errors }}</div>
                {% endif %}
                <div class="field-group">
                    <label>Новий пароль:</label>
                    {{ form.password }}
                </div>
                <div class="field-group">
                    <label>Повторіть пароль:</label>
                    {{ form.password2 }}
                </div>
            </div>
            <button type="submit" class="auth-button">Змінити пароль</button>
        </form>
    </div>
</main>
{% endblock %}
